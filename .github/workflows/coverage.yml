name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    uses: sxzz/workflows/.github/workflows/coverage.yml@v1
    permissions:
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Setup PNPM
        uses: pnpm/action-setup@v2

      - name: Install dependencies
        run: pnpm install

      - name: Approve PNPM Builds
        run: pnpm approve-builds --yes

      - name: Run Coverage
        run: pnpm run coverage
